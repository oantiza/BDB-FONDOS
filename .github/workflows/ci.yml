name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions_python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: functions_python/requirements-dev.txt
      - name: Install deps (locked)
        run: pip install -r requirements-dev.txt
      - name: Run backend remediation tests
        run: >
          python -m pytest -q
          tests/test_effective_bounds_merge.py
          tests/test_bucket_vectors_single_source.py
          tests/test_unified_constraints_flag.py
          tests/test_constraints_builder_real_asset.py
          tests/test_unified_constraints_contract.py
          tests/test_suitability_parity_golden.py

  frontend:
    name: Frontend (vitest)
    runs-on: ubuntu-latest
    env:
      VITE_FIREBASE_API_KEY: "AIzaSyDummyKeyForCiOnlyDoNotUse123456789"
      VITE_FIREBASE_AUTH_DOMAIN: "bdb-fondos-ci.firebaseapp.com"
      VITE_FIREBASE_PROJECT_ID: "bdb-fondos-ci"
      VITE_FIREBASE_STORAGE_BUCKET: "bdb-fondos-ci.appspot.com"
      VITE_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      VITE_FIREBASE_APP_ID: "1:000000000000:web:0000000000000000000000"
      VITE_FIREBASE_MEASUREMENT_ID: "G-0000000000"
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx vitest run

  gate:
    name: Manual overrides gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run manual-overrides:gate
